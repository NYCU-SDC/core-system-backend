name: core-system-dev

services:
  backend:
    image: nycusdc/core-system-backend:dev
    networks:
      - core_system_dev
      - traefik
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DEV: "true"
      ENV: "dev"
      HOST: "0.0.0.0"
      BASE_URL: "https://dev.core-system.sdc.nycu.club"
      DATABASE_URL: postgres://postgres:password@postgres:5432/core_system?sslmode=disable
      MIGRATION_SOURCE: file:///app/migrations
      OTEL_COLLECTOR_URL: 10.1.252.100:4317
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      NYCU_OAUTH_CLIENT_ID: ${NYCU_OAUTH_CLIENT_ID}
      NYCU_OAUTH_CLIENT_SECRET: ${NYCU_OAUTH_CLIENT_SECRET}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET}
      ALLOW_ORIGINS: "*"
      DEFAULT_GLOBAL_ROLES: ${DEFAULT_GLOBAL_ROLES}
      DEFAULT_ORG_ROLES: ${DEFAULT_ORG_ROLES}
      SETUP_YAML: "b3JnYW5pemF0aW9uczoKICAtIG5hbWU6ICJEZWZhdWx0IE9yZ2FuaXphdGlvbiIKICAgIHNsdWc6ICJzZGMiCiAgICBkZXNjcmlwdGlvbjogIlNEQyBpcyBhIHN0dWRlbnQgb3JnYW5pemF0aW9uIGF0IE5ZQ1UgdGhhdCBmb2N1c2VzIG9uIHNvZnR3YXJlIGRldmVsb3BtZW50IGFuZCB0ZWNobm9sb2d5LiI="
    labels:
      - "vector.enable=true"
      - "traefik.enable=true"
      - "traefik.http.routers.core-system-backend-dev.rule=Host(`dev.core-system.sdc.nycu.club`) && PathPrefix(`/api`)"
      - "traefik.http.routers.core-system-backend-dev.entrypoints=websecure"
      - "traefik.http.routers.core-system-backend-dev.tls=true"
      - "traefik.http.routers.core-system-backend-dev.tls.certresolver=cloudflare"

  postgres:
    image: postgres:18
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: core_system
    networks:
      - core_system_dev

networks:
  core_system_dev:
  traefik:
    external: true
